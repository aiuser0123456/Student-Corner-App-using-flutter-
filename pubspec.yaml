name: student_corner
description: Student Corner - Study resources, question banks, notes and AI tools for students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # State management
  provider: ^6.1.2

  # Networking (for Gemini / OpenAI / OpenRouter calls)
  http: ^1.2.2

  # Local persistence (saved resources, settings, API keys)
  shared_preferences: ^2.3.2

  # UI helpers
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  url_launcher: ^6.3.0
  cached_network_image: ^3.4.1
  flutter_markdown: ^0.7.4+1

  # PDF viewing
  syncfusion_flutter_pdfviewer: ^27.1.48

  # Icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
